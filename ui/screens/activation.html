<!-- screens/activation.html — The Guard: Security & Activation -->
<div class="w-full h-full animated-bg flex items-center justify-center p-6">

  <div class="glass-card rounded-2xl shadow-2xl w-full max-w-md p-10"
       style="animation: slideUp 0.6s ease both;">

    <!-- Header -->
    <div class="flex items-center gap-3 mb-8">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-sky-400 to-sky-600 flex items-center justify-center shadow-lg">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944
               a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003
               9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03
               9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
      <div>
        <h1 class="font-heading text-xl font-bold text-sky-700">Device Activation</h1>
        <p class="text-xs text-slate-400 font-body">MULA GO · The Guard</p>
      </div>
    </div>

    <!-- Hardware ID -->
    <div class="mb-7">
      <label class="block text-xs font-heading font-semibold text-sky-700 uppercase tracking-widest mb-2">
        Your Hardware ID
      </label>
      <div class="hwid-box" id="hwid-display">
        <div class="flex items-center justify-center gap-2 text-slate-400 text-sm">
          <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
          Reading device ID...
        </div>
      </div>
      <p class="text-xs text-slate-400 font-body mt-1.5 text-center">
        Share this ID with your provider to receive an activation code.
      </p>
    </div>

    <!-- OTP Input -->
    <div class="mb-7">
      <label class="block text-xs font-heading font-semibold text-sky-700 uppercase tracking-widest mb-2">
        Activation Code
      </label>
      <div class="flex justify-center">
        <input
          id="otp-input"
          type="text"
          inputmode="numeric"
          pattern="[0-9]*"
          maxlength="6"
          placeholder="000000"
          autocomplete="one-time-code"
          class="otp-input"
        />
      </div>
    </div>

    <!-- Status message -->
    <div id="activation-message" class="hidden mb-5 rounded-xl px-4 py-3 text-sm font-body text-center"></div>

    <!-- Activate button -->
    <button id="activate-btn" class="btn-primary w-full" onclick="activateDevice()">
      Activate MULA GO
    </button>

    <!-- Footer note -->
    <p class="text-center text-xs text-slate-400 font-body mt-5 leading-relaxed">
      Your license is securely bound to this hardware.<br/>
      No account or internet connection required to activate.
    </p>
  </div>
</div>

<script>
// ── Activation Screen Logic ──────────────────────────────────────────────────

async function init_activation() {
  // Load Hardware ID
  try {
    const hwid = await window.pywebview.api.get_hardware_id();
    document.getElementById('hwid-display').textContent = hwid;
  } catch(e) {
    document.getElementById('hwid-display').textContent = 'PREVIEW-MODE-NO-HWID';
  }

  // Auto-format OTP input: digits only, max 6
  const input = document.getElementById('otp-input');
  input.addEventListener('input', () => {
    input.value = input.value.replace(/\D/g,'').slice(0,6);
    input.classList.remove('error');
    hideMessage();
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') activateDevice();
  });
}

function showMessage(text, type = 'error') {
  const el = document.getElementById('activation-message');
  el.textContent = text;
  el.className = 'mb-5 rounded-xl px-4 py-3 text-sm font-body text-center';
  if (type === 'success') {
    el.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-200');
  } else {
    el.classList.add('bg-red-50', 'text-red-600', 'border', 'border-red-200');
  }
}

function hideMessage() {
  document.getElementById('activation-message').className = 'hidden mb-5 rounded-xl px-4 py-3 text-sm font-body text-center';
}

async function activateDevice() {
  const input  = document.getElementById('otp-input');
  const btn    = document.getElementById('activate-btn');
  const code   = input.value.trim();

  if (code.length !== 6) {
    input.classList.add('error');
    showMessage('Please enter the full 6-digit activation code.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Verifying…';

  try {
    const result = await window.pywebview.api.verify_code(code);
    if (result.success) {
      showMessage('✓ ' + result.message, 'success');
      btn.textContent = '✓ Activated!';
      btn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';
      setTimeout(() => transitionTo('dashboard'), 1400);
    } else {
      input.classList.add('error');
      showMessage(result.message || 'Invalid code. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Activate MULA GO';
    }
  } catch(e) {
    // Dev/preview mode — bypass
    showMessage('✓ Preview mode: bypassing activation.', 'success');
    setTimeout(() => transitionTo('dashboard'), 1000);
  }
}
</script>
